<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Ads Scheduler</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --text-muted: #8b8d98;
    --primary: #3b82f6;
    --primary-hover: #2563eb;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --gray: #6b7280;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header-info { color: var(--text-muted); font-size: 13px; }
  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover:not(:disabled) { background: #dc2626; }
  .btn-success { background: var(--green); color: #fff; }
  .btn-success:hover:not(:disabled) { background: #16a34a; }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover:not(:disabled) { background: var(--surface); }

  /* Main */
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
  .section { margin-bottom: 32px; }
  .section-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--text);
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-bar select {
    padding: 7px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    min-width: 180px;
  }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 10px 14px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover { background: rgba(59,130,246,0.04); }

  /* Badges */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .badge-active { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-paused { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .badge-draft { background: rgba(107,114,128,0.15); color: var(--gray); }
  .schedule-info { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

  .actions-cell { white-space: nowrap; display: flex; gap: 6px; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    width: 90%;
    max-width: 720px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 { font-size: 17px; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .form-group select,
  .form-group input {
    width: 100%;
    padding: 8px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* Weekly grid */
  .grid-presets {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .grid-presets .btn { padding: 4px 10px; font-size: 11px; }
  .week-grid-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .week-grid {
    display: grid;
    grid-template-columns: 48px repeat(24, 24px);
    grid-template-rows: 20px repeat(7, 28px);
    gap: 1px;
    user-select: none;
    -webkit-user-select: none;
  }
  .week-grid .hdr {
    font-size: 10px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .week-grid .day-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    padding-left: 2px;
  }
  .week-grid .cell {
    width: 24px;
    height: 28px;
    border-radius: 3px;
    background: rgba(255,255,255,0.05);
    cursor: pointer;
    transition: background 0.08s;
  }
  .week-grid .cell.active {
    background: var(--primary);
  }
  .week-grid .cell:hover {
    outline: 1px solid var(--primary);
    outline-offset: -1px;
  }

  /* Scheduler panel */
  .scheduler-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
  }
  .scheduler-results {
    margin-top: 12px;
    font-size: 13px;
    max-height: 300px;
    overflow-y: auto;
  }
  .result-item {
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: baseline;
  }
  .result-item:last-child { border-bottom: none; }

  /* Loading */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .error-banner {
    background: rgba(239,68,68,0.1);
    border: 1px solid var(--red);
    color: var(--red);
    padding: 10px 14px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 13px;
  }

  /* Responsive */
  @media (max-width: 640px) {
    .header { padding: 12px 16px; }
    .container { padding: 16px; }
    th, td { padding: 8px 10px; }
    .actions-cell { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>LinkedIn Ads Scheduler</h1>
    <div class="header-info" style="display:flex;align-items:center;gap:8px;">
      Account:
      <select id="accountSelect" onchange="onAccountChange()" style="padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;">
        <option value="">Loading...</option>
      </select>
    </div>
  </div>
  <button class="btn btn-outline" onclick="loadCampaigns()">Refresh</button>
</div>

<div class="container">
  <div id="errorBanner" class="error-banner" style="display:none"></div>

  <!-- Campaigns -->
  <div class="section">
    <div class="section-title">Campaigns</div>
    <div class="filter-bar">
      <select id="filterGroup" onchange="loadCampaigns()">
        <option value="">All Groups</option>
      </select>
      <select id="filterStatus" onchange="loadCampaigns()">
        <option value="">All Statuses</option>
        <option value="ACTIVE">ACTIVE</option>
        <option value="PAUSED">PAUSED</option>
        <option value="DRAFT">DRAFT</option>
        <option value="ARCHIVED">ARCHIVED</option>
        <option value="CANCELED">CANCELED</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>ID</th>
            <th>Group</th>
            <th>Status</th>
            <th>Daily Budget</th>
            <th>Bid</th>
            <th>Avg Spend/Day</th>
            <th>Pacing</th>
            <th>Schedule</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="campaignTableBody">
          <tr><td colspan="10" class="empty-state">Loading campaigns...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Scheduler -->
  <div class="section">
    <div class="section-title">Scheduler</div>
    <div class="scheduler-panel">
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:12px">
        <button class="btn btn-primary" id="runSchedulerBtn" onclick="runScheduler()">Run Scheduler Now</button>
        <span id="schedulerStatus" class="schedule-info" style="font-size:13px"></span>
      </div>
      <div id="schedulerResults" class="scheduler-results" style="display:none"></div>
    </div>
  </div>
</div>

<!-- Schedule Modal -->
<div class="modal-overlay" id="scheduleModal">
  <div class="modal">
    <h2>Weekly Schedule</h2>
    <input type="hidden" id="modalCampaignId">
    <input type="hidden" id="modalCampaignName">
    <div class="form-group">
      <label>Campaign</label>
      <input type="text" id="modalCampaignLabel" disabled>
    </div>
    <div class="form-group">
      <label>Timezone</label>
      <select id="modalTimezone">
        <option value="America/New_York">America/New_York (Eastern)</option>
        <option value="America/Chicago">America/Chicago (Central)</option>
        <option value="America/Denver">America/Denver (Mountain)</option>
        <option value="America/Los_Angeles">America/Los_Angeles (Pacific)</option>
        <option value="America/Anchorage">America/Anchorage (Alaska)</option>
        <option value="Pacific/Honolulu">Pacific/Honolulu (Hawaii)</option>
        <option value="UTC">UTC</option>
        <option value="Europe/London">Europe/London</option>
        <option value="Europe/Berlin">Europe/Berlin</option>
        <option value="Europe/Paris">Europe/Paris</option>
        <option value="Asia/Tokyo">Asia/Tokyo</option>
        <option value="Asia/Shanghai">Asia/Shanghai</option>
        <option value="Australia/Sydney">Australia/Sydney</option>
      </select>
    </div>
    <div class="form-group">
      <label>Active Hours</label>
      <div class="grid-presets">
        <button class="btn btn-outline" onclick="presetWeekdays()">Weekdays 6a–6p</button>
        <button class="btn btn-outline" onclick="preset247()">24/7</button>
        <button class="btn btn-outline" onclick="presetClear()">Clear All</button>
      </div>
      <div class="week-grid-wrap">
        <div class="week-grid" id="weekGrid"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modalSaveBtn" onclick="saveSchedule()">Save</button>
    </div>
  </div>
</div>

<!-- Edit Campaign Modal -->
<div class="modal-overlay" id="editCampaignModal">
  <div class="modal" style="max-width:480px">
    <h2>Edit Campaign</h2>
    <input type="hidden" id="editCampaignId">
    <input type="hidden" id="editCampaignCurrency">
    <div class="form-group">
      <label>Campaign</label>
      <input type="text" id="editCampaignLabel" disabled>
    </div>
    <div class="form-group">
      <label>Bid Strategy</label>
      <select id="editBidStrategy" onchange="onBidStrategyChange()">
        <option value="">— keep current —</option>
        <option value="MAXIMUM_DELIVERY">MAXIMUM_DELIVERY</option>
        <option value="TARGET_COST">TARGET_COST</option>
        <option value="MANUAL_CPC">MANUAL_CPC</option>
      </select>
    </div>
    <div class="form-group" id="editBidAmountGroup" style="display:none">
      <label>Bid Amount</label>
      <input type="number" id="editBidAmount" step="0.01" min="0" placeholder="e.g. 5.00">
    </div>
    <div class="form-group">
      <label>Daily Budget</label>
      <input type="number" id="editDailyBudget" step="0.01" min="0" placeholder="e.g. 50.00">
    </div>
    <div class="form-group">
      <label>Pacing Strategy</label>
      <select id="editPacingStrategy">
        <option value="">— keep current —</option>
        <option value="DAILY">DAILY</option>
        <option value="LIFETIME">LIFETIME</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-primary" id="editSaveBtn" onclick="saveEditCampaign()">Save</button>
    </div>
  </div>
</div>

<script>
const NON_TOGGLEABLE = new Set(["DRAFT", "ARCHIVED", "CANCELED"]);
const DAY_KEYS = ["sun", "mon", "tue", "wed", "thu", "fri", "sat"];
const DAY_LABELS = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

let currentCampaigns = [];
let campaignGroups = {};  // id -> name
let analyticsData = {};   // campaign_id -> { avgDailySpend, totalSpend, currency }
let gridHours = { sun:[], mon:[], tue:[], wed:[], thu:[], fri:[], sat:[] };
let isDragging = false;
let dragActivate = true;

function getAccountId() {
  return document.getElementById("accountSelect").value;
}

function showError(msg) {
  const el = document.getElementById("errorBanner");
  el.textContent = msg;
  el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 8000);
}

function statusBadge(status) {
  let cls = "badge-draft";
  if (status === "ACTIVE") cls = "badge-active";
  else if (status === "PAUSED") cls = "badge-paused";
  return `<span class="badge ${cls}">${status}</span>`;
}

function setLoading(btn, loading) {
  if (loading) {
    btn.disabled = true;
    btn._origHTML = btn.innerHTML;
    btn.innerHTML = '<span class="spinner"></span>';
  } else {
    btn.disabled = false;
    btn.innerHTML = btn._origHTML || btn.innerHTML;
  }
}

async function apiFetch(url, opts = {}) {
  const resp = await fetch(url, {
    headers: { "Content-Type": "application/json", ...opts.headers },
    ...opts,
  });
  const data = await resp.json();
  if (!resp.ok) {
    throw new Error(data.error || `HTTP ${resp.status}`);
  }
  return data;
}

// ---- Accounts ----

async function loadAccounts() {
  const sel = document.getElementById("accountSelect");
  try {
    const data = await apiFetch("/api/accounts");
    sel.innerHTML = "";
    (data.accounts || []).forEach(a => {
      const opt = document.createElement("option");
      opt.value = a.id;
      opt.textContent = `${a.name} (${a.id})`;
      sel.appendChild(opt);
    });
    // Select the default account
    if (data.default && sel.querySelector(`option[value="${data.default}"]`)) {
      sel.value = data.default;
    }
  } catch (e) {
    sel.innerHTML = '<option value="">Error loading accounts</option>';
  }
}

function onAccountChange() {
  // Reset group filter since groups are per-account
  document.getElementById("filterGroup").innerHTML = '<option value="">All Groups</option>';
  campaignGroups = {};
  loadCampaignGroups();
  loadCampaigns();
}

// ---- Campaign Groups ----

async function loadCampaignGroups() {
  const accountId = getAccountId();
  if (!accountId) return;
  try {
    const data = await apiFetch(`/api/campaign-groups?account_id=${accountId}`);
    const sel = document.getElementById("filterGroup");
    const current = sel.value;
    sel.innerHTML = '<option value="">All Groups</option>';
    (data.groups || []).forEach(g => {
      campaignGroups[g.id] = g.name;
      const opt = document.createElement("option");
      opt.value = g.id;
      opt.textContent = g.name;
      sel.appendChild(opt);
    });
    sel.value = current;
  } catch (e) {
    // Non-fatal — filters just won't populate
  }
}

// ---- Campaigns ----

async function loadCampaigns() {
  const tbody = document.getElementById("campaignTableBody");
  tbody.innerHTML = '<tr><td colspan="10" class="empty-state">Loading campaigns...</td></tr>';

  const accountId = getAccountId();
  if (!accountId) {
    tbody.innerHTML = '<tr><td colspan="10" class="empty-state">Select an account above.</td></tr>';
    return;
  }

  const params = new URLSearchParams();
  params.set("account_id", accountId);
  const groupId = document.getElementById("filterGroup").value;
  const statusVal = document.getElementById("filterStatus").value;
  if (groupId) params.set("campaign_group_id", groupId);
  if (statusVal) params.set("status", statusVal);
  const qs = "?" + params.toString();

  try {
    const data = await apiFetch("/api/campaigns" + qs);
    currentCampaigns = data.campaigns || [];
    renderCampaigns();
    // Fire analytics load in background (non-blocking)
    loadAnalytics();
  } catch (e) {
    showError("Failed to load campaigns: " + e.message);
    tbody.innerHTML = '<tr><td colspan="10" class="empty-state">Error loading campaigns.</td></tr>';
  }
}

function summarizeSchedule(schedule) {
  if (!schedule.enabled) return "—";
  // Legacy format
  if (schedule.resume_time && schedule.pause_time) {
    return `<span class="badge badge-active">Enabled</span><br><span class="schedule-info">${esc(schedule.timezone)}<br>Mon–Fri ${schedule.resume_time}–${schedule.pause_time}</span>`;
  }
  // New hours format
  if (schedule.hours) {
    const h = schedule.hours;
    const weekdays = ["mon","tue","wed","thu","fri"];
    const weekend = ["sat","sun"];
    const allDays = DAY_KEYS;

    // Check 24/7
    const is247 = allDays.every(d => (h[d] || []).length === 24);
    if (is247) {
      return `<span class="badge badge-active">Enabled</span><br><span class="schedule-info">${esc(schedule.timezone)}<br>24/7</span>`;
    }

    // Check if all empty
    const allEmpty = allDays.every(d => (h[d] || []).length === 0);
    if (allEmpty) {
      return `<span class="badge badge-active">Enabled</span><br><span class="schedule-info">${esc(schedule.timezone)}<br>All paused</span>`;
    }

    // Check weekdays-same pattern
    const wdSame = weekdays.every(d => JSON.stringify((h[d]||[]).sort((a,b)=>a-b)) === JSON.stringify((h["mon"]||[]).sort((a,b)=>a-b)));
    const weEmpty = weekend.every(d => (h[d] || []).length === 0);
    if (wdSame && weEmpty && (h["mon"]||[]).length > 0) {
      const hrs = (h["mon"]||[]).sort((a,b)=>a-b);
      const start = hrs[0];
      const end = hrs[hrs.length - 1] + 1;
      // Check contiguous
      const contiguous = hrs.length === (end - start);
      if (contiguous) {
        const fmtH = v => { const ap = v >= 12 ? 'p' : 'a'; return (v % 12 || 12) + ap; };
        return `<span class="badge badge-active">Enabled</span><br><span class="schedule-info">${esc(schedule.timezone)}<br>Mon–Fri ${fmtH(start)}–${fmtH(end)}</span>`;
      }
    }

    // Custom
    const activeDays = allDays.filter(d => (h[d]||[]).length > 0);
    return `<span class="badge badge-active">Enabled</span><br><span class="schedule-info">${esc(schedule.timezone)}<br>Custom (${activeDays.length} day${activeDays.length !== 1 ? 's' : ''})</span>`;
  }
  return `<span class="badge badge-active">Enabled</span><br><span class="schedule-info">${esc(schedule.timezone)}</span>`;
}

function formatBidColumn(c) {
  const strategy = c.bidStrategy || "—";
  let display = `<span class="badge badge-draft">${esc(strategy)}</span>`;
  if (c.unitCost && c.unitCost.amount) {
    display += ` $${parseFloat(c.unitCost.amount).toFixed(2)}`;
  }
  return display;
}

function formatPacingColumn(c) {
  const pacing = c.pacingStrategy || "—";
  let display = `<span class="badge badge-draft">${esc(pacing)}</span>`;
  if (c.runSchedule) {
    const parts = [];
    if (c.runSchedule.start) parts.push(c.runSchedule.start.split(" ")[0]);
    if (c.runSchedule.end) parts.push(c.runSchedule.end.split(" ")[0]);
    if (parts.length) display += `<br><span class="schedule-info">${parts.join(" – ")}</span>`;
  }
  return display;
}

function formatAvgSpend(campaignId) {
  const a = analyticsData[campaignId];
  if (!a) return '<span class="text-muted" data-spend-id="' + campaignId + '">...</span>';
  return `$${a.avgDailySpend.toFixed(2)}`;
}

function renderCampaigns() {
  const tbody = document.getElementById("campaignTableBody");
  if (!currentCampaigns.length) {
    tbody.innerHTML = '<tr><td colspan="10" class="empty-state">No campaigns found.</td></tr>';
    return;
  }
  tbody.innerHTML = currentCampaigns.map(c => {
    const disabled = NON_TOGGLEABLE.has(c.status);
    const pauseResumeBtn = disabled ? "" :
      c.status === "ACTIVE"
        ? `<button class="btn btn-sm btn-outline" onclick="toggleStatus('${c.id}', 'PAUSED', this)">Pause</button>`
        : `<button class="btn btn-sm btn-success" onclick="toggleStatus('${c.id}', 'ACTIVE', this)">Resume</button>`;

    const editBtn = disabled ? "" :
      `<button class="btn btn-sm btn-outline" onclick="openEditModal('${c.id}')">Edit</button>`;

    const scheduleBtn = disabled ? "" :
      c.schedule.enabled
        ? `<button class="btn btn-sm btn-danger" onclick="removeSchedule('${c.id}', this)">Disable</button> <button class="btn btn-sm btn-outline" onclick="openModal('${c.id}', '${escapeAttr(c.name)}', true)">Sched</button>`
        : `<button class="btn btn-sm btn-outline" onclick="openModal('${c.id}', '${escapeAttr(c.name)}', false)">Sched</button>`;

    const groupName = c.campaignGroup ? esc(campaignGroups[c.campaignGroup] || c.campaignGroup) : "—";

    return `<tr>
      <td>${esc(c.name)}</td>
      <td>${c.id}</td>
      <td>${groupName}</td>
      <td>${statusBadge(c.status)}</td>
      <td>${c.dailyBudget}</td>
      <td>${formatBidColumn(c)}</td>
      <td data-spend-id="${c.id}">${formatAvgSpend(c.id)}</td>
      <td>${formatPacingColumn(c)}</td>
      <td>${summarizeSchedule(c.schedule)}</td>
      <td><div class="actions-cell">${pauseResumeBtn}${editBtn}${scheduleBtn}</div></td>
    </tr>`;
  }).join("");
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}
function escapeAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, "&quot;");
}

// ---- Pause / Resume ----

async function toggleStatus(campaignId, newStatus, btn) {
  setLoading(btn, true);
  try {
    await apiFetch(`/api/campaigns/${campaignId}/status`, {
      method: "POST",

// ---- Weekly Grid ----

function buildGrid() {
  const grid = document.getElementById("weekGrid");
  grid.innerHTML = "";

  // Corner
  const corner = document.createElement("div");
  corner.className = "hdr";
  grid.appendChild(corner);

  // Hour headers
  for (let h = 0; h < 24; h++) {
    const hdr = document.createElement("div");
    hdr.className = "hdr";
    hdr.textContent = h;
    grid.appendChild(hdr);
  }

  // Day rows
  for (let d = 0; d < 7; d++) {
    const label = document.createElement("div");
    label.className = "day-label";
    label.textContent = DAY_LABELS[d];
    grid.appendChild(label);

    for (let h = 0; h < 24; h++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.dataset.day = DAY_KEYS[d];
      cell.dataset.hour = h;
      if (gridHours[DAY_KEYS[d]].includes(h)) cell.classList.add("active");

      cell.addEventListener("mousedown", onCellMouseDown);
      cell.addEventListener("mouseenter", onCellMouseEnter);
      cell.addEventListener("touchstart", onCellTouchStart, { passive: false });
      cell.addEventListener("touchmove", onCellTouchMove, { passive: false });

      grid.appendChild(cell);
    }
  }
}

function onCellMouseDown(e) {
  e.preventDefault();
  isDragging = true;
  const day = e.target.dataset.day;
  const hour = parseInt(e.target.dataset.hour);
  dragActivate = !gridHours[day].includes(hour);
  toggleCell(day, hour);
}

function onCellMouseEnter(e) {
  if (!isDragging) return;
  const day = e.target.dataset.day;
  const hour = parseInt(e.target.dataset.hour);
  toggleCell(day, hour);
}

function onCellTouchStart(e) {
  e.preventDefault();
  isDragging = true;
  const touch = e.touches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  if (el && el.dataset.day !== undefined) {
    const day = el.dataset.day;
    const hour = parseInt(el.dataset.hour);
    dragActivate = !gridHours[day].includes(hour);
    toggleCell(day, hour);
  }
}

function onCellTouchMove(e) {
  e.preventDefault();
  if (!isDragging) return;
  const touch = e.touches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  if (el && el.dataset.day !== undefined) {
    toggleCell(el.dataset.day, parseInt(el.dataset.hour));
  }
}

document.addEventListener("mouseup", () => { isDragging = false; });
document.addEventListener("touchend", () => { isDragging = false; });

function toggleCell(day, hour) {
  const arr = gridHours[day];
  const idx = arr.indexOf(hour);
  if (dragActivate) {
    if (idx === -1) arr.push(hour);
  } else {
    if (idx !== -1) arr.splice(idx, 1);
  }
  // Update visual
  const cell = document.querySelector(`.cell[data-day="${day}"][data-hour="${hour}"]`);
  if (cell) {
    if (dragActivate) cell.classList.add("active");
    else cell.classList.remove("active");
  }
}

function presetWeekdays() {
  const wdHours = [];
  for (let h = 6; h < 18; h++) wdHours.push(h);
  gridHours = {
    sun: [], mon: [...wdHours], tue: [...wdHours], wed: [...wdHours],
    thu: [...wdHours], fri: [...wdHours], sat: []
  };
  buildGrid();
}

function preset247() {
  const all = [];
  for (let h = 0; h < 24; h++) all.push(h);
  gridHours = {
    sun: [...all], mon: [...all], tue: [...all], wed: [...all],
    thu: [...all], fri: [...all], sat: [...all]
  };
  buildGrid();
}

function presetClear() {
  gridHours = { sun:[], mon:[], tue:[], wed:[], thu:[], fri:[], sat:[] };
  buildGrid();
}

// ---- Schedule modal ----

function openModal(campaignId, campaignName, isEdit) {
  document.getElementById("modalCampaignId").value = campaignId;
  document.getElementById("modalCampaignName").value = campaignName;
  document.getElementById("modalCampaignLabel").value = `${campaignName} (${campaignId})`;
  document.getElementById("modalTimezone").value = "America/New_York";

  // If editing, load existing schedule
  if (isEdit) {
    const c = currentCampaigns.find(x => x.id === campaignId);
    if (c && c.schedule && c.schedule.enabled) {
      if (c.schedule.timezone) {
        document.getElementById("modalTimezone").value = c.schedule.timezone;
      }
      if (c.schedule.hours) {
        gridHours = {};
        DAY_KEYS.forEach(d => {
          gridHours[d] = [...(c.schedule.hours[d] || [])];
        });
      } else {
        // Convert legacy to grid for display
        const rt = parseInt((c.schedule.resume_time || "06:00").split(":")[0]);
        const pt = parseInt((c.schedule.pause_time || "18:00").split(":")[0]);
        const wdHours = [];
        for (let h = rt; h < pt; h++) wdHours.push(h);
        gridHours = {
          sun: [], mon: [...wdHours], tue: [...wdHours], wed: [...wdHours],
          thu: [...wdHours], fri: [...wdHours], sat: []
        };
      }
    } else {
      presetWeekdays();
      buildGrid();
    }
  } else {
    // Default preset
    presetWeekdays();
  }

  buildGrid();
  document.getElementById("scheduleModal").classList.add("active");
}

function closeModal() {
  document.getElementById("scheduleModal").classList.remove("active");
}

async function saveSchedule() {
  const btn = document.getElementById("modalSaveBtn");
  setLoading(btn, true);
  const campaignId = document.getElementById("modalCampaignId").value;
  const campaignName = document.getElementById("modalCampaignName").value;
  const timezone = document.getElementById("modalTimezone").value;

  // Sort each day's hours
  const hours = {};
  DAY_KEYS.forEach(d => {
    hours[d] = [...gridHours[d]].sort((a, b) => a - b);
  });

  try {
    // Remove existing schedule first (ignore 404)
    try {
      await apiFetch(`/api/schedules/${campaignId}`, { method: "DELETE" });
    } catch (e) { /* ok if not found */ }

    await apiFetch("/api/schedules", {
      method: "POST",
      body: JSON.stringify({
        account_id: getAccountId(),
        campaign_id: campaignId,
        campaign_name: campaignName,
        timezone: timezone,
        hours: hours,
      }),
    });
    closeModal();
    await loadCampaigns();
  } catch (e) {
    showError("Failed to save schedule: " + e.message);
  } finally {
    setLoading(btn, false);
  }
}

async function removeSchedule(campaignId, btn) {
  setLoading(btn, true);
  try {
    await apiFetch(`/api/schedules/${campaignId}?account_id=${getAccountId()}`, { method: "DELETE" });
    await loadCampaigns();
  } catch (e) {
    showError("Failed to remove schedule: " + e.message);
    setLoading(btn, false);
  }
}

// ---- Edit Campaign Modal ----

function onBidStrategyChange() {
  const strategy = document.getElementById("editBidStrategy").value;
  const show = strategy === "TARGET_COST" || strategy === "MANUAL_CPC";
  document.getElementById("editBidAmountGroup").style.display = show ? "block" : "none";
}

function openEditModal(campaignId) {
  const c = currentCampaigns.find(x => x.id === campaignId);
  if (!c) return;

  document.getElementById("editCampaignId").value = c.id;
  document.getElementById("editCampaignLabel").value = `${c.name} (${c.id})`;

  // Determine currency from budget or unitCost
  const currency = (c.dailyBudgetRaw && c.dailyBudgetRaw.currencyCode) ||
                   (c.unitCost && c.unitCost.currencyCode) || "USD";
  document.getElementById("editCampaignCurrency").value = currency;

  // Populate current values
  const stratSel = document.getElementById("editBidStrategy");
  stratSel.value = c.bidStrategy || "";
  onBidStrategyChange();

  document.getElementById("editBidAmount").value =
    (c.unitCost && c.unitCost.amount) ? c.unitCost.amount : "";

  document.getElementById("editDailyBudget").value =
    (c.dailyBudgetRaw && c.dailyBudgetRaw.amount) ? c.dailyBudgetRaw.amount : "";

  document.getElementById("editPacingStrategy").value = c.pacingStrategy || "";

  document.getElementById("editCampaignModal").classList.add("active");
}

function closeEditModal() {
  document.getElementById("editCampaignModal").classList.remove("active");
}

async function saveEditCampaign() {
  const btn = document.getElementById("editSaveBtn");
  setLoading(btn, true);

  const campaignId = document.getElementById("editCampaignId").value;
  const currency = document.getElementById("editCampaignCurrency").value;

  const body = { account_id: getAccountId(), currency: currency };

  const bidStrategy = document.getElementById("editBidStrategy").value;
  if (bidStrategy) body.bid_strategy = bidStrategy;

  const bidAmount = document.getElementById("editBidAmount").value;
  if (bidAmount !== "") body.bid_amount = bidAmount;

  const dailyBudget = document.getElementById("editDailyBudget").value;
  if (dailyBudget !== "") body.daily_budget = dailyBudget;

  const pacingStrategy = document.getElementById("editPacingStrategy").value;
  if (pacingStrategy) body.pacing_strategy = pacingStrategy;

  // Check if there's anything to update beyond account_id/currency
  const hasUpdates = bidStrategy || bidAmount !== "" || dailyBudget !== "" || pacingStrategy;
  if (!hasUpdates) {
    closeEditModal();
    setLoading(btn, false);
    return;
  }

  try {
    await apiFetch(`/api/campaigns/${campaignId}/update`, {
      method: "POST",
      body: JSON.stringify(body),
    });
    closeEditModal();
    await loadCampaigns();
    loadAnalytics();
  } catch (e) {
    showError("Failed to update campaign: " + e.message);
  } finally {
    setLoading(btn, false);
  }
}

// ---- Scheduler ----

function utcToEastern(utcStr) {
  if (!utcStr) return "";
  const d = new Date(utcStr.replace(" UTC", "Z"));
  return d.toLocaleString("en-US", {
    timeZone: "America/New_York",
    month: "short", day: "numeric",
    hour: "numeric", minute: "2-digit",
    hour12: true,
  }) + " ET";
}

async function loadSchedulerStatus() {
  try {
    const s = await apiFetch("/api/scheduler/status");
    const el = document.getElementById("schedulerStatus");
    const parts = [];
    if (s.last_run) parts.push(`Last run: ${utcToEastern(s.last_run)}`);
    if (s.next_run) parts.push(`Next auto-run: ${utcToEastern(s.next_run)}`);
    parts.push(`Interval: ${s.interval_minutes} min`);
    el.textContent = parts.join("  |  ");
  } catch (e) { /* non-fatal */ }
}

async function runScheduler() {
  const btn = document.getElementById("runSchedulerBtn");
  const results = document.getElementById("schedulerResults");
  setLoading(btn, true);
  results.style.display = "none";
  try {
    const data = await apiFetch("/api/scheduler/run", { method: "POST" });
    results.style.display = "block";
    if (!data.actions || !data.actions.length) {
      results.innerHTML = '<div class="result-item" style="color:var(--text-muted)">No rules configured.</div>';
    } else {
      results.innerHTML = data.actions.map(a => {
        let badge = "";
        if (a.action === "ACTIVE") badge = '<span class="badge badge-active">ACTIVE</span>';
        else if (a.action === "PAUSED") badge = '<span class="badge badge-paused">PAUSED</span>';
        else if (a.action === "ERROR") badge = '<span class="badge badge-draft">ERROR</span>';
        else badge = '<span class="badge badge-draft">SKIP</span>';

        const detail = a.action === "ERROR" || a.action === "SKIP"
          ? `<span style="color:var(--text-muted)">${esc(a.reason || "")}</span>`
          : `<span style="color:var(--text-muted)">${a.day} ${a.time} (${a.timezone})</span>`;

        return `<div class="result-item">${badge} <strong>${esc(a.campaign_name)}</strong> ${detail}</div>`;
      }).join("");
    }
    results.innerHTML += `<div style="margin-top:8px;color:var(--text-muted);font-size:12px">${esc(data.message)}</div>`;
    await loadCampaigns();
    loadSchedulerStatus();
  } catch (e) {
    showError("Scheduler error: " + e.message);
  } finally {
    setLoading(btn, false);
  }
}

document.addEventListener("DOMContentLoaded", async () => {
  await loadAccounts();
  loadCampaignGroups();
  loadCampaigns();
  loadSchedulerStatus();
